<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Bot Controller</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: #0f1117;
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            gap: 20px;
        }
        .card {
            background: #1a1d27;
            border: 1px solid #2d3148;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
        .dot { width: 10px; height: 10px; background: #57f287; border-radius: 50%; box-shadow: 0 0 8px #57f287; animation: pulse 2s infinite; }
        .dot.red { background: #ed4245; box-shadow: 0 0 8px #ed4245; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        h2 { font-size: 1rem; font-weight: 600; color: #fff; }
        .subtitle { font-size: 0.78rem; color: #5865f2; margin-top: 2px; }
        label { display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        input, textarea, select {
            width: 100%; background: #0f1117; border: 1px solid #2d3148;
            border-radius: 10px; color: #e2e8f0; font-size: 0.95rem;
            font-family: inherit; padding: 12px 14px; outline: none;
            transition: border-color 0.2s; margin-bottom: 14px;
        }
        input:focus, textarea:focus { border-color: #5865f2; }
        textarea { resize: vertical; min-height: 80px; }
        button {
            width: 100%; background: #5865f2; color: #fff; border: none;
            border-radius: 10px; padding: 13px; font-size: 0.95rem;
            font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s;
        }
        button:hover { background: #4752c4; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #2d3148; color: #64748b; cursor: not-allowed; }
        .status { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 0.88rem; display: none; }
        .status.success { background: rgba(87,242,135,0.1); border: 1px solid rgba(87,242,135,0.3); color: #57f287; display: block; }
        .status.error { background: rgba(237,66,69,0.1); border: 1px solid rgba(237,66,69,0.3); color: #ed4245; display: block; }
        .status.loading { background: rgba(88,101,242,0.1); border: 1px solid rgba(88,101,242,0.3); color: #5865f2; display: block; }
        .play-btn {
            background: #1e8449;
            margin-top: 0;
            font-size: 1.1rem;
            padding: 18px;
            letter-spacing: 0.03em;
        }
        .play-btn:hover { background: #196f3d; }
    </style>
</head>
<body>

    <!-- Card: เชื่อมต่อห้อง -->
    <div class="card">
        <div class="header">
            <div class="dot red" id="connDot"></div>
            <div>
                <h2>เชื่อมต่อห้อง Voice</h2>
                <div class="subtitle" id="connSubtitle">กำลังตรวจสอบ...</div>
            </div>
        </div>
        <label>Server ID</label>
        <input type="text" id="guildId" placeholder="เช่น 1272435838470455366">
        <label>Voice Channel ID</label>
        <input type="text" id="channelId" placeholder="เช่น 1272435838470455371">
        <button onclick="connect()">🔗 เชื่อมต่อห้องนี้</button>
        <div class="status" id="connStatus"></div>
    </div>

    <!-- Card: ทดสอบเล่นเสียง -->
    <div class="card">
        <div class="header">
            <div style="font-size:1.4rem">🎵</div>
            <div>
                <h2>ทดสอบเล่นเสียง</h2>
                <div class="subtitle">Google Drive MP3</div>
            </div>
        </div>
        <button class="play-btn" onclick="testPlay()">▶️ เล่นเสียงทดสอบ</button>
        <div class="status" id="playStatus"></div>
    </div>

    <!-- Card: TTS -->
    <div class="card">
        <div class="header">
            <div style="font-size:1.4rem">🔊</div>
            <div>
                <h2>สั่งให้บอทพูด</h2>
                <div class="subtitle">Text-to-Speech</div>
            </div>
        </div>
        <label>ข้อความ</label>
        <textarea id="textInput" placeholder="พิมพ์ข้อความที่นี่..."></textarea>
        <label>ภาษา</label>
        <select id="langSelect">
            <option value="th">🇹🇭 ภาษาไทย</option>
            <option value="en">🇺🇸 English</option>
        </select>
        <button onclick="speak()">🔊 สั่งพูด</button>
        <div class="status" id="speakStatus"></div>
    </div>

    <script>
        // File ID จาก Google Drive ที่ส่งมา
        const TEST_DRIVE_ID = '15ZcHO9uMA075bkq3BLpVIkqeMihgV1NQ';

        async function checkStatus() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                const dot = document.getElementById('connDot');
                const sub = document.getElementById('connSubtitle');
                if (data.connected) {
                    dot.className = 'dot';
                    sub.textContent = `เชื่อมต่ออยู่ | ${data.botTag}`;
                    document.getElementById('guildId').value = data.guildId;
                    document.getElementById('channelId').value = data.channelId;
                } else {
                    dot.className = 'dot red';
                    sub.textContent = 'ยังไม่ได้เชื่อมต่อ';
                }
            } catch(e) {}
        }

        async function connect() {
            const guildId = document.getElementById('guildId').value.trim();
            const channelId = document.getElementById('channelId').value.trim();
            const status = document.getElementById('connStatus');
            if (!guildId || !channelId) { showStatus(status, 'กรุณาใส่ Server ID และ Channel ID', 'error'); return; }
            showStatus(status, '⏳ กำลังเชื่อมต่อ...', 'loading');
            try {
                const res = await fetch('/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ guildId, channelId })
                });
                const data = await res.json();
                if (res.ok) { showStatus(status, '✅ ' + data.message, 'success'); checkStatus(); }
                else { showStatus(status, '❌ ' + data.error, 'error'); }
            } catch(e) { showStatus(status, '❌ ไม่สามารถติดต่อ server ได้', 'error'); }
        }

        async function testPlay() {
            const status = document.getElementById('playStatus');
            showStatus(status, '⏳ กำลัง download และเล่นเสียง...', 'loading');
            try {
                const res = await fetch('/play', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ driveId: TEST_DRIVE_ID })
                });
                const data = await res.json();
                if (res.ok) { showStatus(status, '✅ ' + data.message, 'success'); }
                else { showStatus(status, '❌ ' + (data.error || 'เกิดข้อผิดพลาด') + ' | ' + (data.detail || ''), 'error'); }
            } catch(e) { showStatus(status, '❌ ไม่สามารถติดต่อ server ได้', 'error'); }
        }

        async function speak() {
            const text = document.getElementById('textInput').value.trim();
            const lang = document.getElementById('langSelect').value;
            const status = document.getElementById('speakStatus');
            if (!text) { showStatus(status, 'กรุณาพิมพ์ข้อความก่อน', 'error'); return; }
            showStatus(status, '⏳ กำลังส่งคำสั่ง...', 'loading');
            try {
                const res = await fetch('/speak', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, lang })
                });
                const data = await res.json();
                if (res.ok) { showStatus(status, '✅ ' + data.message, 'success'); }
                else { showStatus(status, '❌ ' + (data.error || 'เกิดข้อผิดพลาด'), 'error'); }
            } catch(e) { showStatus(status, '❌ ไม่สามารถติดต่อ server ได้', 'error'); }
        }

        function showStatus(el, msg, type) {
            el.textContent = msg;
            el.className = 'status ' + type;
        }

        checkStatus();
        setInterval(checkStatus, 10000);
    </script>
</body>
</html>
